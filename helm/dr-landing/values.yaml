replicaCount: 1

image:
  repository: dr-landing
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: traefik
  host: birthday.alexgr.space
  tls: true
  tlsSecret: birthday-alexgr-space-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: traefik

# Base URL for QR code generation (derived from ingress host + TLS)
baseUrl: "" # If empty, generated from ingress.host and ingress.tls

persistence:
  enabled: true
  storageClass: ""
  size: 128Mi
  mountPath: /data

resources:
  requests:
    cpu: 5m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
