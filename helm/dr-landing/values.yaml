replicaCount: 1

image:
  repository: dr-landing
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  host: dr-landing.example.com
  tls: false
  tlsSecret: ""

persistence:
  enabled: true
  storageClass: ""
  size: 128Mi
  mountPath: /data

resources:
  requests:
    cpu: 5m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
